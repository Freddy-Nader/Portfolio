<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words | Alfredo Nader</title>
    <link rel="stylesheet" href="/src/css/style.css">
    <script type="module" src="/src/js/script.js"></script>
    <script type="module" src="/src/js/words.js"></script>
    <load src="/src/partials/all.html" />
    <style>
        .controls {
            margin: 2rem 0;
            display: flex;
            gap: 1rem;
        }

        #search-input {
            padding: 0.5rem;
            flex: 1;
            background: transparent;
            border: 1px solid var(--border-color, #ccc);
            color: inherit;
        }

        #sort-btn {
            background: transparent;
            border: 1px solid var(--border-color, #ccc);
            color: inherit;
            cursor: pointer;
            padding: 0.5rem 1rem;
        }
    </style>
</head>

<body>
    <header>
        <!-- Reusing main header style simplified -->
        <a href="/" class="btn">← Back Home</a>
        <h1>Words</h1>
    </header>

    <main>
        <section class="controls">
            <input type="text" id="search-input" placeholder="Search posts...">
            <button id="sort-btn">Sort: Newest</button>
        </section>

        <section id="posts-list">
            <!-- Posts injected here -->
            <p>Loading...</p>
        </section>
    </main>
</body>

</html>
